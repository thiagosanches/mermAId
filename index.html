<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ez-gantt - Project Timeline Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>ez-gantt - Project Timeline Builder</h1>
                    <p>Interactive Gantt chart timelines for your projects</p>
                </div>
                <div class="header-actions">
                    <a href="https://github.com/thiagosanches/ez-gantt" target="_blank" rel="noopener noreferrer" class="btn btn-icon github-link" title="View on GitHub">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                        </svg>
                    </a>
                    <button id="darkModeToggle" class="btn btn-icon" title="Toggle dark mode">🌙</button>
                </div>
            </div>
        </header>

        <div class="content">
            <button id="togglePanel" class="toggle-panel-btn" title="Hide panel">&#8249;</button>
            <div class="form-section" id="formSection">
                <h2>Project Details</h2>

                <div class="form-group">
                    <label for="projectName">Project Name</label>
                    <input type="text" id="projectName" placeholder="My Project" value="My Project">
                </div>

                <div class="form-group">
                    <label for="projectStart">Start Date</label>
                    <input type="date" id="projectStart">
                </div>

                <details class="holidays-section">
                    <summary>Custom Non-Working Days (Holidays)</summary>
                    <div class="holidays-body">
                        <div id="holidaysList" class="holidays-list"></div>
                        <div class="holiday-input-row">
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="holidayDate">
                            </div>
                            <div class="form-group">
                                <label>Label (optional)</label>
                                <input type="text" id="holidayLabel" placeholder="e.g. Christmas">
                            </div>
                        </div>
                        <button id="addHoliday" class="btn btn-secondary">Add holiday</button>
                        <div class="holiday-actions">
                            <button id="exportHolidays" class="btn btn-sm btn-secondary">Export holidays</button>
                            <label for="importHolidaysInput" class="btn btn-sm btn-secondary">Import holidays</label>
                            <input type="file" id="importHolidaysInput" accept=".json" style="display:none">
                        </div>
                    </div>
                </details>

                <h3 class="section-label">Activities</h3>
                <div id="activitiesContainer">
                    <div class="activity-item" data-id="0">
                        <div class="activity-header-row">
                            <input type="text" class="activity-name" placeholder="Activity Name" value="Refinement" onchange="updateDependencyDropdowns()">
                            <input type="color" class="activity-color activity-color-swatch" value="#4F46E5" title="Color">
                            <button class="remove-activity" onclick="removeActivity(this)" title="Remove">✕</button>
                        </div>
                        <div class="activity-fields">
                            <div class="form-group">
                                <label>Working Days:</label>
                                <input type="number" class="activity-workdays" placeholder="5" value="5" min="1">
                            </div>
                            <div class="form-group">
                                <label>FTE:</label>
                                <input type="number" class="activity-fte" placeholder="1" value="1" min="0.1" step="0.1">
                            </div>
                            <div class="form-group fte-hint-group">
                                <label>&nbsp;</label>
                                <span class="fte-hint">= 5 calendar days</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Depends on:</label>
                            <select class="activity-dependency" onchange="toggleStartDateField(this)">
                                <option value="">None</option>
                            </select>
                        </div>
                        <div class="form-group custom-start-date">
                            <label>Custom Start Date:</label>
                            <input type="date" class="activity-custom-start">
                        </div>
                        <div class="form-group milestone-row">
                            <label class="milestone-toggle-label">
                                <input type="checkbox" class="activity-milestone"> Milestone
                            </label>
                        </div>
                        <div class="form-group milestone-inputs-row" style="display:none;">
                            <input type="text" class="milestone-character-input" value="⭐" maxlength="2" placeholder="⭐">
                            <input type="date" class="milestone-date-input">
                        </div>
                        <div class="form-group custom-label-row">
                            <label class="custom-label-toggle-label">
                                <input type="checkbox" class="activity-custom-label-toggle"> Custom Label
                            </label>
                            <input type="text" class="custom-label-input" placeholder="Enter custom label" style="display:none;">
                        </div>
                        <div class="form-group show-dates-row">
                            <label class="show-dates-toggle-label">
                                <input type="checkbox" class="activity-show-dates-toggle" checked> Show Dates
                            </label>
                        </div>
                    </div>
                </div>

                <button id="addActivity" class="btn btn-secondary">Add activity</button>
                <button id="generateTimeline" class="btn btn-primary" style="display:none">Generate timeline</button>
                <div class="project-actions">
                    <button id="newProject" class="btn btn-secondary">New project</button>
                    <button id="saveProject" class="btn btn-secondary">Save project</button>
                    <label for="loadProjectInput" class="btn btn-secondary">Load project</label>
                    <input type="file" id="loadProjectInput" accept=".json" style="display:none">
                </div>
                <span id="autosaveStatus" class="autosave-status"></span>


            </div>

            <div class="preview-section">
                <div class="preview-header">
                    <h2>Timeline Preview</h2>
                    <label class="toggle-label">
                        <input type="checkbox" id="showWeekends"> Show weekends
                    </label>
                    <label class="toggle-label">
                        <input type="checkbox" id="showWeeks" checked> Show weeks
                    </label>
                    <label class="toggle-label">
                        <input type="checkbox" id="showMonths" checked> Show months
                    </label>
                    <label class="toggle-label">
                        <input type="checkbox" id="showDays" checked> Show days
                    </label>
                    <label class="toggle-label">
                        <input type="checkbox" id="showToday" checked> Show today
                    </label>
                    <button id="exportPng" class="btn btn-secondary" style="display:none">Export PNG</button>
                </div>
                <div id="ganttChart"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
